name: Run Post Merge

on:
  push:
    branches:
      - 'main'
      - 'releases/**'

jobs:
  run-unittests-python:
    name: Unit Tests Python
    uses: ./.github/workflows/unittests_python.yml
    with:
      trigger-sha: ${{ github.event.after }}
