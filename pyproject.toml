[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "litert-cli"
version = "0.1.1.dev17"

description = "LiteRT Toolkit Command Line Interface"
dependencies = [
    "click",
    "numpy",
    "huggingface_hub",
    "requests",
    "sentencepiece",
    "ai-edge-litert",
    "ai-edge-quantizer",
    "Pillow",
    "ai-edge-litert-sdk-qualcomm-nightly",
    "ai-edge-litert-sdk-mediatek-nightly",
]

[project.optional-dependencies]
test = [
    "absl-py",
]
convert = [
    "litert-torch-nightly",
    "torch",
    # Latest transformers break litert-torch-nightly
    "transformers<5.0.0",
    "torchvision",
    "sentencepiece",
]
visualize = [
    "ai-edge-model-explorer"
]
lm = [
    "litert-lm-cli-nightly",
    "litert-lm-nightly",
]
all = [
    "litert-cli[convert,visualize,lm]"
]

[project.scripts]
litert = "litert_cli.litert:cli"

[tool.setuptools]
packages = ["litert_cli", "litert_cli.commands", "litert_cli.core"]
package-dir = {"litert_cli" = ".", "litert_cli.commands" = "commands", "litert_cli.core" = "core"}

[tool.setuptools.package-data]
"litert_cli" = ["test_data/*"]
"test_scripts" = ["*"]
