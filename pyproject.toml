[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "litert-cli"
version = "0.1.1.dev16"

description = "LiteRT Toolkit Command Line Interface"
dependencies = [
    "click",
    "numpy",
    "huggingface_hub",
    "requests",
    "sentencepiece",
    "ai-edge-litert",
    "ai-edge-quantizer",
    "Pillow",
    "ai-edge-litert-sdk-qualcomm-nightly",
    "ai-edge-litert-sdk-mediatek-nightly",
]

[project.optional-dependencies]
download = [
    "huggingface_hub",
    "requests",
]
convert = [
    "litert-torch-nightly", 
    "torch",
    # Latest transformers break litert-torch-nightly
    "transformers<5.0.0",
    "torchvision",
    "sentencepiece",
]
run = [
    "ai-edge-litert"
]
visualize = [
    "ai-edge-model-explorer"
]
lm = [
    "litert-lm-cli-nightly",
    "litert-lm-nightly",
]
quantize = [
    "ai-edge-quantizer"
]
image = [
    "Pillow",
]
all = [
    "litert-cli[convert,visualize,lm]"
]

[project.scripts]
litert = "litert_cli.litert:cli"

[tool.setuptools]
[tool.setuptools.packages.find]
include = ["litert_cli*", "test_scripts*"]

[tool.setuptools.package-data]
"litert_cli" = ["test_data/*"]
"test_scripts" = ["*"]



